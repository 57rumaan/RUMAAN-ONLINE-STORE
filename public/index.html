<!DOCTYPE html>
<html>
<head>
<title>Rumaan Online Store</title>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
}

.store{
display:flex;
justify-content:center;
gap:20px;
margin-top:40px;
}

.product{
background:white;
padding:20px;
border-radius:10px;
width:200px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}

button{
background:black;
color:white;
border:none;
padding:10px;
cursor:pointer;
}
</style>

</head>

<body>

<h1>Rumaan Online Store</h1>

<div class="store">

<div class="product">
<h3>T-Shirt</h3>
<p>$20</p>
<button>Add to Cart</button>
</div>

<div class="product">
<h3>Shoes</h3>
<p>$50</p>
<button>Add to Cart</button>
</div>

<div class="product">
<h3>Cap</h3>
<p>$15</p>
<button>Add to Cart</button>
</div>

</div>

</body>
</html>
