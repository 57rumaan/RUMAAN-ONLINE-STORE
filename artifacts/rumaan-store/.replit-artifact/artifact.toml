kind = "web"
previewPath = "/"
title = "RUMAAN ONLINE STORE"
version = "1.0.0"
id = "artifacts/rumaan-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 25285
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/rumaan-store run dev"

[services.env]
PORT = "25285"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/rumaan-store", "run", "build"]
publicDir = "artifacts/rumaan-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
